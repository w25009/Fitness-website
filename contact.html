<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class= "header">
        <div class="container">
            <div class="header-left">
                 <img class="header-logo" src="images/logo1.jpg" alt="Fitness Logo">
            </div>
            <div class="header-right">
                <a href="index.html">トップ</a>
                <a href="menu.html">メニュー</a>
                <a href="access.html">アクセス</a>
                <a href="contact.html">問い合わせ</a>
            </div>
            <div class="clear"></div>
        </div>
        
        
    </div>
    <div class="contact">
    <div class="container">
      <h2>お問い合わせ</h2>
      <p>ご質問・ご相談などお気軽にお問い合わせください。</p>

      <form class="contact-form" action="#" method="post">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name" required>

        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required>

        <label for="message">メッセージ</label>
        <textarea id="message" name="message" rows="6" required></textarea>

        <button type="submit">送信</button>
      </form>
    </div>
  </div>

     <div class="footer">
        <div class="container">
            <div class="footer-left">
                <p>このサイトをシェアする。</p>
                <a href="https://twitter.com/share?ref_src=twsrc%5Etfw" class="twitter-share-button" data-text="Marine Coffee" data-show-count="false">Tweet</a><script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
            </div>
            <div class="footer-right">
                &copy; 2025 Fitness Gym
            </div>
            <div class="clear"></div>
        </div>
    </div>
